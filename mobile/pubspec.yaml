name: navhud
description: "Ứng dụng chỉ đường di động + BLE companion (NUS) cho HUD ESP32/nRF."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.12.0
  flutter: ">=3.44.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # ── State & DI ──────────────────────────
  flutter_riverpod: ^3.0.0

  # ── Map & Location ──────────────────────
  maplibre_gl: ^0.26.0
  geolocator: ^14.0.0          # GPS stream 1 Hz, accuracy filter

  # ── BLE ─────────────────────────────────
  flutter_blue_plus: ^2.3.0   # ⚠️ commercial license — xem §3.2 | Built-in Kotlin support

  # ── Network ─────────────────────────────
  dio: ^5.9.0                  # Routing/Overpass API, retry + interceptor

  # ── Storage ─────────────────────────────
  drift: ^2.28.0
  sqlite3_flutter_libs: ^0.5.36
  path_provider: ^2.1.5
  shared_preferences: ^2.5.0   # settings nhẹ

  # ── Voice & background ──────────────────
  flutter_tts: ^4.2.0              # giọng đọc vi-VN
  flutter_foreground_task: ^9.0.0  # foreground service Android (location + connectedDevice)
  wakelock_plus: ^1.2.0            # giữ màn hình khi navigate
  permission_handler: ^12.0.0

  # ── UI & Font ───────────────────────────
  google_fonts: ^6.3.0
  flutter_svg: ^2.0.0          # icon maneuver, biển báo dạng SVG
  cupertino_icons: ^1.0.8
  intl: ^0.20.0                # format ETA, khoảng cách

dev_dependencies:
  flutter_test:
    sdk: flutter
  build_runner: ^2.5.0
  drift_dev: ^2.28.0
  flutter_lints: ^6.0.0
  mocktail: ^1.0.0             # mock IBleTransport, IRouteService

flutter:
  uses-material-design: true
  assets:
    - assets/icons/maneuvers/
    - assets/icons/signs/
